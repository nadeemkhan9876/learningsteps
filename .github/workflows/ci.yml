name: "Learningsteps CI"

on:
	push:
		branches: [ "main" ]
	pull_request:
		branches: [ "main" ]
	workflow_dispatch:

jobs:
	build:
		name: Build and Test
		runs-on: ubuntu-latest

		steps:
		- name: Checkout
			uses: actions/checkout@v5

		- name: Set up Python 3.13
			uses: actions/setup-python@v6
			with:
				python-version: '3.13'

		- name: Install dependencies
			run: |
				python -m pip install --upgrade pip
				if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi

		- name: Lint with ruff (non-blocking)
			run: |
				if command -v ruff >/dev/null 2>&1 || python -m pip show ruff >/dev/null 2>&1; then
					ruff . --exit-zero
				else
					python -m pip install ruff
					ruff . --exit-zero
				fi

		- name: Run tests (non-blocking)
			run: |
				if command -v pytest >/dev/null 2>&1 || python -m pip show pytest >/dev/null 2>&1; then
					pytest || true
				else
					python -m pip install pytest
					pytest || true
				fi

		- name: Build Docker image tagged with commit SHA
			env:
				IMAGE_TAG: ${{ github.sha }}
			run: |
				docker build -t learningsteps:${IMAGE_TAG} .

